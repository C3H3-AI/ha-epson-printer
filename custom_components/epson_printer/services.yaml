print_text:
  name: Print text
  description: Send text to print via RAW port 9100.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    text:
      name: Text
      description: Text content to print.
      required: true
      example: "Hello World"
      selector:
        text:

print_file:
  name: Print file
  description: Print a file (PDF, image, etc.) via RAW port 9100.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    filepath:
      name: File path
      description: Absolute path to the file on the HA server.
      required: true
      example: "/config/www/report.pdf"
      selector:
        text:

clean_printhead:
  name: Clean printhead
  description: Run printhead cleaning cycle.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    deep:
      name: Deep clean
      description: Whether to run a deep cleaning cycle.
      required: false
      default: false
      selector:
        boolean:

nozzle_check:
  name: Nozzle check
  description: Print a nozzle check pattern.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields: {}

ipp_print_file:
  name: Print file via IPP
  description: Submit a print job via IPP (supports JPEG, PNG, PDF).
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    file_path:
      name: File path
      description: >
        Absolute path to the file on the HA server.
        Supported formats: JPEG, PNG, PDF (printer-dependent).
      required: true
      example: "/config/www/photos/sunset.jpg"
      selector:
        text:
    job_name:
      name: Job name
      description: Optional job name shown in printer queue.
      required: false
      example: "Sunset Photo"
      selector:
        text:

initialize:
  name: Initialize / reset printer
  description: >
    Send ESC @ to reset the printer to its initial state.
    Useful to recover from a paper jam or a stuck "printing" status.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields: {}
