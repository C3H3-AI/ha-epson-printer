print_text:
  name: Print text
  description: Send text to print via RAW port 9100.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    text:
      name: Text
      description: Text content to print.
      required: true
      example: "Hello World"
      selector:
        text:

print_file:
  name: Print file
  description: Print a file (PDF, image, etc.) via RAW port 9100.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    filepath:
      name: File path
      description: Absolute path to the file on the HA server.
      required: true
      example: "/config/www/report.pdf"
      selector:
        text:

clean_printhead:
  name: Clean printhead
  description: Run printhead cleaning cycle.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    deep:
      name: Deep clean
      description: Whether to run a deep cleaning cycle.
      required: false
      default: false
      selector:
        boolean:

nozzle_check:
  name: Nozzle check
  description: Print a nozzle check pattern.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields: {}

ipp_print_file:
  name: Print file via IPP
  description: Submit a print job via IPP (supports JPEG, PNG, PDF).
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    file_path:
      name: File path
      description: >
        Absolute path to the file on the HA server.
        Supported formats: JPEG, PNG, PDF (printer-dependent).
      required: true
      example: "/config/www/photos/sunset.jpg"
      selector:
        text:
    job_name:
      name: Job name
      description: Optional job name shown in printer queue.
      required: false
      example: "Sunset Photo"
      selector:
        text:

initialize:
  name: Initialize / reset printer
  description: >
    Send ESC @ to reset the printer to its initial state.
    Useful to recover from a paper jam or a stuck "printing" status.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields: {}

print:
  name: Print
  description: >
    Unified print entry point. Provide plain text or an absolute file path
    on the HA server. Text, images and PDFs are routed automatically
    (text/raw or PDF/image over IPP). Office documents (Word/Excel/PowerPoint/...)
    are converted to PDF first when the 'Convert Office documents' option is
    enabled for this integration; otherwise they are rejected with a clear error.
  target:
    device:
      integration: epson_printer
    entity:
      integration: epson_printer
  fields:
    content:
      name: Content
      description: Text to print, or an absolute file path on the HA server.
      required: true
      example: "Hello World"
      selector:
        text:
    content_type:
      name: Content type
      description: "auto: decide by content; text: force text; file: force file path."
      required: false
      default: auto
      selector:
        select:
          options:
            - auto
            - text
            - file
    job_name:
      name: Job name
      description: Optional job name shown in the printer queue (IPP only).
      required: false
      selector:
        text:
